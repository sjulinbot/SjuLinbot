<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal | St Joseph's University</title>
  
  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; 
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #003366 0%, #00509e 100%);
      min-height: 100vh;
      color: #333;
    }
    .app-container {
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center; 
      padding: 20px;
    }
    .login-box {
      background: white; 
      padding: 50px; 
      width: 100%; 
      max-width: 450px;
      border-radius: 20px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #ffb100, #ff6b35);
    }
    .university-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #003366, #00509e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: bold;
    }
    .input-field {
      width: 100%; 
      padding: 18px; 
      margin: 15px 0; 
      border: 2px solid #e1e5e9;
      border-radius: 15px; 
      font-size: 16px; 
      transition: all 0.3s;
      background: #f8f9fa;
    }
    .input-field:focus {
      outline: none; 
      border-color: #003366; 
      box-shadow: 0 0 0 4px rgba(0,51,102,0.1);
      background: white;
    }
    .btn-primary {
      width: 100%; 
      padding: 18px; 
      background: linear-gradient(135deg, #003366, #00509e);
      color: white; 
      border: none; 
      border-radius: 15px; 
      font-size: 18px; 
      font-weight: 700;
      cursor: pointer; 
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-primary:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 15px 30px rgba(0,51,102,0.4); 
    }
    .btn-danger {
      background: #dc3545; 
      padding: 12px 24px; 
      color: white; 
      border: none;
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 700;
      margin-left: 15px;
    }
    .btn-warning {
      background: linear-gradient(135deg, #ffc107, #ff8c00);
      color: #333; 
      border: none; 
      padding: 15px 30px;
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 700; 
      width: 100%; 
      margin-top: 15px;
      font-size: 16px;
    }
    .header {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      margin-bottom: 30px; 
      padding-bottom: 25px; 
      border-bottom: 4px solid #003366;
    }
    .stats-grid {
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px; 
      margin-top: 30px;
    }
    .stat-card {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 30px; 
      border-radius: 15px; 
      text-align: center; 
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .stat-card h3 { 
      color: #28a745; 
      margin: 0 0 12px 0; 
      font-size: 32px; 
      font-weight: 800; 
    }
    .stat-card p { 
      margin: 0; 
      color: #666; 
      font-weight: 600; 
      font-size: 16px;
    }
    .table-container { 
      background: #f8f9fa; 
      padding: 25px; 
      border-radius: 15px; 
      margin-top: 20px;
      border: 1px solid #dee2e6;
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 15px; 
    }
    th, td { 
      padding: 15px; 
      text-align: left; 
      border-bottom: 1px solid #dee2e6; 
    }
    th { 
      background: #003366; 
      color: white; 
      font-weight: 700; 
    }
    tr:hover { 
      background: #e9ecef; 
    }
    .message { 
      padding: 18px; 
      margin: 20px 0; 
      border-radius: 15px; 
      font-weight: 700; 
      text-align: center; 
      font-size: 16px;
    }
    .success { 
      background: #d4edda; 
      color: #155724; 
      border: 2px solid #c3e6cb; 
    }
    .error { 
      background: #f8d7da; 
      color: #721c24; 
      border: 2px solid #f5c6cb; 
    }
    .profile-container {
      background: white; 
      padding: 50px; 
      width: 100%; 
      max-width: 1200px;
      margin: 40px auto; 
      border-radius: 20px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr; }
      .login-box, .profile-container { margin: 20px; padding: 30px; }
      .header { flex-direction: column; gap: 15px; text-align: center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
  const { useState } = React;

  function StudentPortal() {
    const [regNum, setRegNum] = useState('');
    const [password, setPassword] = useState('');
    const [message, setMessage] = useState('');
    const [isLoggedIn, setIsLoggedIn] = useState(false);
    const [activeUser, setActiveUser] = useState(null);

    // Consolidated Mapping for Attendance and Results
    const studentData = {
      '233bcac19': {
        name: "Princetine Xavier B",
        attendance: '233bcac19-attendancep.html',
        results: 'resultprincetine.html'
      },
      '233bcac26': {
        name: "Johnson Akash A",
        attendance: '233bcac26-attendancej.html',
        results: 'resultjonhson.html'
      },
      '233bcac30': {
        name: "Sreelaya S",
        attendance: '233bcac30-attendances.html',
        results: 'resultsreelaya.html'
      }
    };

    const handleLogin = (e) => {
      e.preventDefault();
      const userRegNum = regNum.trim().toLowerCase();

      // Validate login
      if (studentData[userRegNum] && userRegNum === password.toLowerCase()) {
        setMessage('✅ Login Successful!');
        setTimeout(() => {
          setActiveUser(studentData[userRegNum]);
          setIsLoggedIn(true);
          setMessage('');
        }, 1000);
      } else {
        setMessage('❌ Invalid Register Number or Password!');
        setTimeout(() => setMessage(''), 3000);
      }
    };

    const navigateTo = (pageType) => {
      // Directs to either attendance or results file based on button click
      window.location.href = activeUser[pageType];
    };

    // --- VIEW 1: LOGIN FORM ---
    if (!isLoggedIn) {
      return (
        <div className="login-box">
          <div className="university-logo">SJU</div>
          <h2 style={{ color: '#003366', marginBottom: '10px', fontSize: '28px' }}>
            🎓 St Joseph's University
          </h2>
          <h3 style={{ color: '#666', marginBottom: '30px', fontSize: '18px' }}>
            Student Portal Login
          </h3>
          
          <form onSubmit={handleLogin}>
            <input
              type="text"
              className="input-field"
              placeholder="Register Number"
              value={regNum}
              onChange={(e) => setRegNum(e.target.value)}
              required
            />
            <input
              type="password"
              className="input-field"
              placeholder="Password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              required
            />
            <button type="submit" className="btn-primary">
              Sign In 
            </button>
          </form>
          
          {message && (
            <div className={`message ${message.includes('Invalid') ? 'error' : 'success'}`}>
              {message}
            </div>
          )}
        </div>
      );
    }

    // --- VIEW 2: DASHBOARD (Selection Page) ---
    return (
      <div className="login-box">
        <div className="university-logo">SJU</div>
        <h2 style={{ color: '#003366', marginBottom: '5px' }}>Welcome,</h2>
        <h3 style={{ color: '#666', marginBottom: '30px' }}>{activeUser.name}</h3>
        
        <p style={{marginBottom: '20px', fontWeight: 'bold', color: '#003366'}}>Please select a portal:</p>

        <button onClick={() => navigateTo('attendance')} className="btn-primary" style={{marginBottom: '15px'}}>
          📅 VIEW ATTENDANCE
        </button>

        <button onClick={() => navigateTo('results')} className="btn-warning">
          📊 VIEW ACADEMIC RESULTS
        </button>

        <button 
          onClick={() => setIsLoggedIn(false)} 
          style={{marginTop: '30px', background: 'none', border: 'none', color: '#dc3545', cursor: 'pointer', fontWeight: 'bold'}}
        >
          ← Logout
        </button>
      </div>
    );
  }

  function App() {
    return (
      <div className="app-container">
        <StudentPortal />
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
