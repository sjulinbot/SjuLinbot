<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal | St Joseph's University</title>
  
  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; 
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #003366 0%, #00509e 100%);
      min-height: 100vh;
      color: #333;
    }
    .app-container {
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center; 
      padding: 20px;
    }
    .login-box {
      background: white; 
      padding: 50px; 
      width: 100%; 
      max-width: 450px;
      border-radius: 20px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #ffb100, #ff6b35);
    }
    .university-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #003366, #00509e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: bold;
    }
    .input-field {
      width: 100%; 
      padding: 18px; 
      margin: 15px 0; 
      border: 2px solid #e1e5e9;
      border-radius: 15px; 
      font-size: 16px; 
      transition: all 0.3s;
      background: #f8f9fa;
    }
    .input-field:focus {
      outline: none; 
      border-color: #003366; 
      box-shadow: 0 0 0 4px rgba(0,51,102,0.1);
      background: white;
    }
    .btn-primary {
      width: 100%; 
      padding: 18px; 
      background: linear-gradient(135deg, #003366, #00509e);
      color: white; 
      border: none; 
      border-radius: 15px; 
      font-size: 18px; 
      font-weight: 700;
      cursor: pointer; 
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-primary:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 15px 30px rgba(0,51,102,0.4); 
    }
    .btn-danger {
      background: #dc3545; 
      padding: 12px 24px; 
      color: white; 
      border: none;
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 700;
      margin-left: 15px;
    }
    .btn-warning {
      background: linear-gradient(135deg, #ffc107, #ff8c00);
      color: #333; 
      border: none; 
      padding: 15px 30px;
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 700; 
      width: 100%; 
      margin-top: 15px;
      font-size: 16px;
    }
    .header {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      margin-bottom: 30px; 
      padding-bottom: 25px; 
      border-bottom: 4px solid #003366;
    }
    .stats-grid {
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px; 
      margin-top: 30px;
    }
    .stat-card {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 30px; 
      border-radius: 15px; 
      text-align: center; 
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .stat-card h3 { 
      color: #28a745; 
      margin: 0 0 12px 0; 
      font-size: 32px; 
      font-weight: 800; 
    }
    .stat-card p { 
      margin: 0; 
      color: #666; 
      font-weight: 600; 
      font-size: 16px;
    }
    .table-container { 
      background: #f8f9fa; 
      padding: 25px; 
      border-radius: 15px; 
      margin-top: 20px;
      border: 1px solid #dee2e6;
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 15px; 
    }
    th, td { 
      padding: 15px; 
      text-align: left; 
      border-bottom: 1px solid #dee2e6; 
    }
    th { 
      background: #003366; 
      color: white; 
      font-weight: 700; 
    }
    tr:hover { 
      background: #e9ecef; 
    }
    .message { 
      padding: 18px; 
      margin: 20px 0; 
      border-radius: 15px; 
      font-weight: 700; 
      text-align: center; 
      font-size: 16px;
    }
    .success { 
      background: #d4edda; 
      color: #155724; 
      border: 2px solid #c3e6cb; 
    }
    .error { 
      background: #f8d7da; 
      color: #721c24; 
      border: 2px solid #f5c6cb; 
    }
    .profile-container {
      background: white; 
      padding: 50px; 
      width: 100%; 
      max-width: 1200px;
      margin: 40px auto; 
      border-radius: 20px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr; }
      .login-box, .profile-container { margin: 20px; padding: 30px; }
      .header { flex-direction: column; gap: 15px; text-align: center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Student Data for SJU
    const studentData = {
      '233bcac30': {
        name: 'Sreelaya T R',
        course: 'BCA (Sem 3)',
        dept: 'School of Information Technology',
        phone: '+91 9946246868',
        email: 'sreelaya.tr@sju.edu.in',
        rollNo: 'SJU/BCA/2023/030',
        admissionYear: '2023',
        attendance: 85,
        subjects: [
          { name: 'Python Programming', held: 45, attended: 40, code: 'BCA301' },
          { name: 'Data Structures', held: 42, attended: 35, code: 'BCA302' },
          { name: 'Database Systems', held: 38, attended: 32, code: 'BCA303' },
          { name: 'Web Technologies', held: 40, attended: 34, code: 'BCA304' }
        ],
        cgpa: 8.72,
        sgpa: { sem1: 8.45, sem2: 8.92, current: 8.72 },
        fees: { amount: 45000, status: 'pending', dueDate: 'Feb 28, 2026' }
      },
      '233bcac19': {
        name: 'Princetine Xavier B',
        course: 'BCA (Sem 3)',
        dept: 'School of Information Technology',
        phone: '+91 7090254312',
        email: 'princetine@sju.edu.in',
        rollNo: 'SJU/BCA/2023/019',
        admissionYear: '2023',
        attendance: 92,
       
        cgpa: 9.12,
        sgpa: { sem1: 9.05, sem2: 9.28, current: 9.12 },
        fees: { amount: 42000, status: 'paid', dueDate: 'Feb 28, 2026' }
      },

      '233bcac26': {
  name: 'Johnson Akash',
  course: 'BCA (Sem 3)',
  dept: 'School of Information Technology',
  phone: '+91 8976543210',
  email: 'johnson.akash@sju.edu.in',
  rollNo: 'SJU/BCA/2023/026',
  admissionYear: '2023',
  attendance: 88,
  subjects: [
    { name: 'Python Programming', held: 45, attended: 41, code: 'BCA301' },
    { name: 'Data Structures', held: 42, attended: 38, code: 'BCA302' },
    { name: 'Database Systems', held: 38, attended: 33, code: 'BCA303' },
    { name: 'Web Technologies', held: 40, attended: 36, code: 'BCA304' }
  ],
  cgpa: 8.45,
  sgpa: { sem1: 8.32, sem2: 8.65, current: 8.45 },
  fees: { amount: 45000, status: 'pending', dueDate: 'Feb 28, 2026' }
}

    };

    // Login Component
    function LoginForm({ onLogin }) {
      const [regNum, setRegNum] = useState('');
      const [password, setPassword] = useState('');
      const [message, setMessage] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        const credentials = {
          '233bcac30': '233bcac30',
          '233bcac19': '233bcac19',
            '233bcac26': '233bcac26'
        };

        const userRegNum = regNum.trim().toLowerCase();
        if (credentials[userRegNum] && credentials[userRegNum] === password) {
          onLogin(userRegNum);
          setMessage('✅ Login Successful!');
          setTimeout(() => setMessage(''), 2000);
        } else {
          setMessage('❌ Invalid Register Number or Password!');
          setTimeout(() => setMessage(''), 3000);
        }
      };

      return (
        <div className="login-box">
          <div className="university-logo">SJU</div>
          <h2 style={{ color: '#003366', marginBottom: '10px', fontSize: '28px' }}>
            🎓 St Joseph's University
          </h2>
          <h3 style={{ color: '#666', marginBottom: '30px', fontSize: '18px' }}>
            Student Portal Login
          </h3>
          
          <form onSubmit={handleSubmit}>
            <input
              type="text"
              className="input-field"
              placeholder="Register Number"
              value={regNum}
              onChange={(e) => setRegNum(e.target.value)}
              maxLength={20}
              required
            />
            <input
              type="password"
              className="input-field"
              placeholder="Password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              required
            />
            <button type="submit" className="btn-primary">
              Sign In 
            </button>
          </form>
          
          {message && (
            <div className={`message ${message.includes('Invalid') ? 'error' : 'success'}`}>
              {message}
            </div>
          )}
          
          
        </div>
      );
    }

    // Dashboard Components (AttendanceTable, FeesStatus, etc.)
    function AttendanceTable({ subjects, overall }) {
      return (
        <div className="table-container">
          <h4 style={{ color: '#28a745', margin: '0 0 25px 0', fontSize: '20px' }}>
            📊 Overall Attendance: <strong>{overall}%</strong>
          </h4>
          <table>
            <thead>
              <tr>
                <th>Subject Code</th>
                <th>Subject</th>
                <th>Held</th>
                <th>Attended</th>
                <th>Attendance</th>
              </tr>
            </thead>
            <tbody>
              {subjects.map((sub, idx) => (
                <tr key={idx}>
                  <td style={{ fontFamily: 'monospace' }}>{sub.code}</td>
                  <td>{sub.name}</td>
                  <td>{sub.held}</td>
                  <td>{sub.attended}</td>
                  <td style={{ color: '#28a745', fontWeight: '700' }}>
                    {Math.round((sub.attended / sub.held) * 100)}%
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function FeesStatus({ fees }) {
      const isPaid = fees.status === 'paid';
      return (
        <div className={`table-container ${isPaid ? 'success' : 'error'}`}>
          <h4 style={{ margin: '0 0 20px 0', color: isPaid ? '#28a745' : '#dc3545' }}>
            💰 Semester Fees: <strong>₹{fees.amount.toLocaleString()}</strong>
          </h4>
          <div style={{ fontSize: '22px', fontWeight: '800', marginBottom: '20px' }}>
            {isPaid ? '✅ PAID' : '⭕ PENDING'}
          </div>
          <p style={{ margin: '0 0 15px 0', color: '#666' }}>
            Due Date: <strong>{fees.dueDate}</strong>
          </p>
          {!isPaid && (
            <button className="btn-warning" onClick={() => alert('✅ Payment Successful! Status updated.')}>
              💳 PAY NOW
            </button>
          )}
        </div>
      );
    }

    // Main Student Dashboard
    function StudentProfile({ studentId, onLogout }) {
      const student = studentData[studentId];
      if (!student) return <div>Student data not found</div>;

      return (
        <div className="profile-container">
          <div className="header">
            <div>
              <h1 style={{ color: '#003366', margin: '0 0 5px 0', fontSize: '36px' }}>
                Welcome back, <strong>{student.name}!</strong> 👋
              </h1>
              <p style={{ color: '#666', margin: 0, fontSize: '18px' }}>
                {student.rollNo} | {student.course} | {student.admissionYear}
              </p>
            </div>
            <button className="btn-danger" onClick={onLogout}>
              🚪 LOGOUT
            </button>
          </div>

          <div className="stats-grid">
            <div className="stat-card">
              <h3>{student.cgpa}</h3>
              <p>CGPA / 10</p>
            </div>
            <div className="stat-card">
              <h3>{student.attendance}%</h3>
              <p>Attendance</p>
            </div>
            <div className="stat-card">
              <h3>{student.sgpa.current}</h3>
              <p>Current SGPA</p>
            </div>
            <div className="stat-card">
              <h3>{student.dept}</h3>
              <p>Department</p>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '40px', marginTop: '40px' }}>
            <div>
              <h3 style={{ color: '#003366', borderBottom: '4px solid #003366', paddingBottom: '15px', marginBottom: '25px' }}>
                📋 Personal Details & Attendance
              </h3>
              <div style={{ background: '#f8f9fa', padding: '25px', borderRadius: '15px', marginBottom: '25px' }}>
                <p><strong>Register No:</strong> {studentId.toUpperCase()}</p>
                <p><strong>Roll No:</strong> {student.rollNo}</p>
                <p><strong>Phone:</strong> {student.phone}</p>
                <p><strong>Email:</strong> {student.email}</p>
              </div>
              <AttendanceTable subjects={student.subjects} overall={student.attendance} />
            </div>

            <div>
              <h3 style={{ color: '#003366', borderBottom: '4px solid #003366', paddingBottom: '15px', marginBottom: '25px' }}>
                📈 Academic & Fees Status
              </h3>
              <div style={{ background: '#e8f5e9', padding: '35px', borderRadius: '15px', textAlign: 'center', marginBottom: '25px' }}>
                <h2 style={{ color: '#28a745', margin: '0 0 15px 0', fontSize: '40px' }}>
                  {student.cgpa}/10
                </h2>
                <p style={{ fontSize: '24px', color: '#155724', margin: 0, fontWeight: '700' }}>
                  {student.cgpa >= 8.5 ? 'DISTINCTION' : 'FIRST CLASS'}
                </p>
              </div>
              <FeesStatus fees={student.fees} />
            </div>
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      const [currentUser, setCurrentUser] = useState(null);

      const handleLogin = (userId) => {
        setCurrentUser(userId);
      };

      const handleLogout = () => {
        setCurrentUser(null);
      };

      return (
        <div className="app-container">
          {currentUser ? (
            <StudentProfile studentId={currentUser} onLogout={handleLogout} />
          ) : (
            <LoginForm onLogin={handleLogin} />
          )}
        </div>
      );
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
