<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course Wise Attendance Report - All 6 Semesters</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        background: #f2f2f2;
        font-family: Arial, Helvetica, sans-serif;
        color: #333;
    }

    .report {
        width: 900px;
        margin: auto;
        background: #fff;
        padding: 20px 25px;
        border: 1px solid #ddd;
    }

    .title {
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    .semester-box {
        margin-bottom: 15px;
        font-size: 12px;
    }

    select {
        padding: 5px;
        font-size: 12px;
    }

    .note {
        font-size: 11px;
        color: #555;
        background: #f7f7f7;
        border: 1px solid #ddd;
        padding: 8px;
        margin: 10px 0 20px 0;
    }

    .sub-title {
        text-align: center;
        font-size: 13px;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .sub-text {
        text-align: center;
        font-size: 11px;
        color: #555;
        margin-bottom: 15px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
    }

    th, td {
        border: 1px solid #e0e0e0;
        padding: 7px 6px;
        text-align: center;
    }

    th {
        background: #fafafa;
        font-weight: bold;
    }

    td.course {
        text-align: left;
        padding-left: 10px;
    }

    tfoot td {
        font-weight: bold;
        background: #fafafa;
    }
</style>
</head>

<body>

<div class="report">

    <div class="title">COURSE WISE REPORT</div>

    <!-- Semester Selection -->
    <div class="semester-box">
        <label><strong>Semester:</strong></label>
        <select onchange="loadSemester(this.value)">
            <option value="sem1">Semester 1</option>
            <option value="sem2">Semester 2</option>
            <option value="sem3">Semester 3</option>
            <option value="sem4">Semester 4</option>
            <option value="sem5">Semester 5</option>
            <option value="sem6">Semester 6</option>
        </select>
    </div>

    <div class="note">
        <strong>Note:</strong> When the rule “Attendance count from date of admission” is enabled,
        data is shown from the date of admission.[file:1]
    </div>

    <div class="sub-title">COURSE WISE REPORT</div>
    <div class="sub-text" id="semesterText">
        Using attendance rule for Semester 1[file:1]
    </div>

    <table>
        <thead>
            <tr>
                <th>Sl.No</th>
                <th>Course Name</th>
                <th>TH</th>
                <th>AH</th>
                <th>DL</th>
                <th>AH + DL</th>
                <th>AH%</th>
                <th>AH+DL%</th>
            </tr>
        </thead>

        <tbody id="attendanceBody"></tbody>

        <tfoot id="attendanceFooter"></tfoot>
    </table>

</div>

<script>
const data = {
    sem1: {
        text: "Using attendance rule for Semester 1 from 2023-07-18 to 2023-11-30",
        rows: [
            ["IGNITORS-I IGI", 6, 6],
            ["Fundamentals of Computers CA 1121", 34, 34],
            ["Programming in C CA 1221", 33, 30],
            ["Mathematical Foundations CA 1321", 36, 36],
            ["Information Technology Lab CA 1P1", 15, 15],
            ["C Programming Lab CA 1P2", 14, 14],
            ["Fundamentals of Finance BCOE 1", 20, 18],
            ["Kannada KA 122", 36, 30],
            ["General English I GE 121", 32, 32]
        ]
    },
    sem2: {
        text: "Using attendance rule for Semester 2 from 2024-01-02 to 2024-05-09",
        rows: [
            ["Makers Of Modern India HSOE", 32, 32],
            ["Data Structures Using C CA 2121", 37, 34],
            ["Object Oriented Concepts using JAVA CA 2221", 39, 36],
            ["Discrete Mathematical Structures CA 2321", 38, 38],
            ["Data Structures LAB CA 2P1", 19, 19],
            ["Java Lab CA 2P2", 14, 14],
            ["THEOLOGYHRD TH-HRD UG", 10, 10],
            ["General English GE 221", 36, 36],
            ["KANNADA KA 222", 37, 37]
        ]
    },
    sem3: {
        text: "Using attendance rule for Semester 3 from 08-07-2024 to 29-10-2024",
        rows: [
            ["Database Management Systems CA 3122", 39, 32],
            ["C and Dotnet Framework CA 3222", 41, 39],
            ["Computer Communication and Networks CA 3322", 39, 38],
            ["DBMS Lab CA 3P1", 22, 20],
            ["C and Dotnet Framework Lab CA 3P2", 17, 17],
            ["General English III GE 322", 34, 31],
            ["IGNITORS-III IG-III", 6, 6],
            ["Kannada KA 322", 40, 38],
            ["Public Governance PSOE 3", 36, 30],
            ["Artificial Intelligence SECARI", 0, 0]
        ]
    },
    sem4: {
        text: "Using attendance rule for Semester 4 from 04-12-2024 to 30-03-2025",
        rows: [
            ["Constitution of India AECC IC", 0, 0],
            ["Python Programming CA 4122", 33, 29],
            ["Computer Multimedia And Animation CA 4222", 32, 29],
            ["Operating System Concepts CA 4322", 34, 32],
            ["Python Programming Lab CA 4P1", 20, 20],
            ["Multimedia and Animation Lab CA 4P2", 18, 18],
            ["General English GE 422", 33, 30],
            ["Kannada KA 422", 37, 35],
            ["TOURISM KA 4", 34, 30],
            ["TERM PAPER TP", 0, 0]
        ]
    },
    sem5: {
        text: "Using attendance rule for Semester 5 from 23-06-2025 to 29-09-2025",
        rows: [
            ["E-Commerce CA 5123", 32, 31],
            ["Internet Technologies CA 5223", 36, 36],
            ["Cyberlaw and Cybersecurity CA 5323", 36, 34],
            ["Internet Technologies Lab CA 5P1", 24, 24],
            ["Cyber Security Lab CA 5P2", 22, 20],
            ["Cloud Computing CADE 5423", 35, 34],
            ["Vocational 1 AWS-Cloud Practitioner Essentials CAVO 1", 29, 27],
            ["Cyber Security SEC CS", 0, 0]
        ]
    },
    sem6: {
        text: "Using attendance rule for Semester 6 from 26-11-2025 to 31-03-2026",
        rows: [
            ["Software Engineering CA 6123", 15, 14],
            ["Artificial Intelligence and Applications CA 6223", 15, 14],
            ["Internet of things CA 6323", 16, 16],
            ["Mobile Applications Development Lab CA 6P1", 8, 8],
            ["MAJOR PROJECT LAB CA 6P2", 12, 12],
            ["Mobile Application Development CADE 6423", 11, 11],
            ["Vocational 2 Power BI DAV 02", 14, 13]
        ]
    }
};

function loadSemester(sem) {
    const body = document.getElementById("attendanceBody");
    const footer = document.getElementById("attendanceFooter");
    const text = document.getElementById("semesterText");

    body.innerHTML = "";
    footer.innerHTML = "";
    text.innerText = data[sem].text;

    let totalTH = 0, totalAH = 0;

    data[sem].rows.forEach((row, index) => {
        const th = row[1];
        const ah = row[2];
        const dl = 0;
        const percentAH = th > 0 ? ((ah / th) * 100).toFixed(2) : "0.00";
        const percentAHDL = th > 0 ? ((ah / th) * 100).toFixed(2) : "0.00";

        totalTH += th;
        totalAH += ah;

        body.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td class="course">${row[0]}</td>
                <td>${th}</td>
                <td>${ah}</td>
                <td>${dl}</td>
                <td>${ah + dl}</td>
                <td>${percentAH}%</td>
                <td>${percentAHDL}%</td>
            </tr>
        `;
    });

    const totalPercent = totalTH > 0 ? ((totalAH / totalTH) * 100).toFixed(2) : "0.00";

    footer.innerHTML = `
        <tr>
            <td colspan="2">Total</td>
            <td>${totalTH}</td>
            <td>${totalAH}</td>
            <td>0</td>
            <td>${totalAH}</td>
            <td>${totalPercent}%</td>
            <td>${totalPercent}%</td>
        </tr>
    `;
}

// Load default semester
loadSemester("sem1");
</script>

</body>
</html>
