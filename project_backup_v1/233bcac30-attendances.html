<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course Wise Attendance Report - All 6 Semesters</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        background: #f2f2f2;
        font-family: Arial, Helvetica, sans-serif;
        color: #333;
    }

    .report {
        width: 900px;
        margin: auto;
        background: #fff;
        padding: 20px 25px;
        border: 1px solid #ddd;
    }

    .title {
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    .semester-box {
        margin-bottom: 15px;
        font-size: 12px;
    }

    select {
        padding: 5px;
        font-size: 12px;
    }

    .note {
        font-size: 11px;
        color: #555;
        background: #f7f7f7;
        border: 1px solid #ddd;
        padding: 8px;
        margin: 10px 0 20px 0;
    }

    .sub-title {
        text-align: center;
        font-size: 13px;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .sub-text {
        text-align: center;
        font-size: 11px;
        color: #555;
        margin-bottom: 15px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
    }

    th, td {
        border: 1px solid #e0e0e0;
        padding: 7px 6px;
        text-align: center;
    }

    th {
        background: #fafafa;
        font-weight: bold;
    }

    td.course {
        text-align: left;
        padding-left: 10px;
    }

    tfoot td {
        font-weight: bold;
        background: #fafafa;
    }
</style>
</head>

<body>

<div class="report">

    <div class="title">COURSE WISE REPORT</div>

    <!-- Semester Selection -->
    <div class="semester-box">
        <label><strong>Semester:</strong></label>
        <select onchange="loadSemester(this.value)">
            <option value="sem1">Semester 1</option>
            <option value="sem2">Semester 2</option>
            <option value="sem3">Semester 3</option>
            <option value="sem4">Semester 4</option>
            <option value="sem5">Semester 5</option>
            <option value="sem6">Semester 6</option>
        </select>
    </div>

    <div class="note">
        <strong>Note:</strong> When the rule “Attendance count from date of admission” is enabled,
        data is shown from the date of admission.[file:1]
    </div>

    <div class="sub-title">COURSE WISE REPORT</div>
    <div class="sub-text" id="semesterText">
        Using attendance rule for Semester 1[file:1]
    </div>

    <table>
        <thead>
            <tr>
                <th>Sl.No</th>
                <th>Course Name</th>
                <th>TH</th>
                <th>AH</th>
                <th>DL</th>
                <th>AH + DL</th>
                <th>AH%</th>
                <th>AH+DL%</th>
            </tr>
        </thead>

        <tbody id="attendanceBody"></tbody>

        <tfoot id="attendanceFooter"></tfoot>
    </table>

</div>

<script>
const data = {
    sem1: {
        text: "Using attendance rule for Semester 1 from 2023-07-18 to 2023-11-30",
        rows: [
        ["IGNITORS(IG)", 6, 6],
        ["Fundamentals of Computers (CA 1121)", 37, 36],
        ["Programming in C (CA 1221)", 38, 38],
        ["Mathematical Foundations (CA 1323)", 36, 35],
        ["Information Technology Lab (CA 1P1)", 15, 13],
        ["C Programming Lab (CA 1P2)", 14, 14],
        ["Fundamentals of Finance (BCOE1)", 30, 28],
        ["Additional English (AE121)", 34, 32],
        ["General English I (GE 121)", 32, 32]
    ]
    },
    sem2: {
        text: "Using attendance rule for Semester 2 from 2024-01-02 to 2024-05-09",
        rows:[
        ["Indian Polity: Issues And Concerns (PSOE 2)", 34, 30],
        ["Data Structures Using C (CA 2121)", 42, 40],
        ["Object Oriented Concepts using JAVA (CA 2221)", 45, 43],
        ["Discrete Mathematical Structures (CA 2321)", 41, 38],
        ["Data Structures LAB (CA 2P1)", 19, 19],
        ["Java Lab (CA 2P2)", 14, 14],
        ["Additional English (AE 221)", 37, 35],
        ["THEOLOGY/HRD (TH-HRD UG)", 10, 10],
        ["General English (GE 221)", 39, 34]
    ]
    },
    sem3: {
        text: "Using attendance rule for Semester 3 from 08-07-2024 to 29-10-2024",
        rows: [
           ["Additional English III (AE 322)", 36, 31],
        ["Financial Health and Wellbeing (BCOE 7)", 33, 28],
        ["Database Management Systems (CA 3122)", 40, 34],
        ["C# and Dotnet Framework (CA 3222)", 41, 36],
        ["Computer Communication and Networks (CA 3322)", 45, 35],
        ["DBMS Lab (CA 3P1)", 18, 16],
        ["C# and Dotnet Framework Lab (CA 3P2)", 19, 17],
        ["General English (GE 322)", 34, 27],
        ["IGNITORS (IG-II)", 6, 6],
        ["Artificial Intelligence (SEG AR1)", 0, 0]
        ]
    },
    sem4: {
        text: "Using attendance rule for Semester 4 from 04-12-2024 to 30-03-2025",
        rows: [
           ["Additional English IV (AE 422)", 33, 32],
        ["Constitution of India (AECCIC)", 0, 0],
        ["Python Programming (CA 4122)", 33, 31],
        ["Computer Multimedia and Animation (CA 4222)", 32, 31],
        ["Operating System Concepts (CA 4322)", 34, 34],
        ["Python Programming Lab (CA 4P124)", 20, 20],
        ["Multimedia and Animation Lab (CA 4P224)", 18, 18],
        ["General English (GE 422)", 34, 32],
        ["Civil Services (PSOE 4)", 33, 30],
        ["TERM PAPER (TP)", 0, 0]
        ]
    },
    sem5: {
        text: "Using attendance rule for Semester 5 from 23-06-2025 to 29-09-2025",
        rows: [
           ["E-Commerce (CA 5123)", 32, 30],
        ["Internet Technologies (CA 5223)", 36, 36],
        ["Cyberlaw and Cybersecurity (CA 5323)", 36, 34],
        ["Internet Technologies Lab (CA 5P1)", 16, 14],
        ["Cyber Security Lab (CA 5P2)", 30, 30],
        ["Cloud Computing (DADE 5423)", 35, 32],
        ["Vocational 1 AWS-Cloud Practitioner (CAVO 1)", 29, 26],
        ["Cyber Security (SEC CS)", 0, 0]
        ]
    },
    sem6: {
        text: "Using attendance rule for Semester 6 from 26-11-2025 to 31-03-2026",
        rows: [
           ["Software Engineering (CA 6123)", 15, 12],
        ["Artificial Intelligence and Applications (CA 6223)", 15, 12],
        ["Internet of Things (CA 6323)", 17, 12],
        ["Mobile Applications Development Lab (CA 6P1)", 10, 8],
        ["MAJOR PROJECT LAB (CA 6P2)", 12, 10],
        ["Mobile Application Development (CADE 6423)", 12, 12],
        ["Vocational 2 Power BI (DAV 02)", 15, 13]
        ]
    }
};

function loadSemester(sem) {
    const body = document.getElementById("attendanceBody");
    const footer = document.getElementById("attendanceFooter");
    const text = document.getElementById("semesterText");

    body.innerHTML = "";
    footer.innerHTML = "";
    text.innerText = data[sem].text;

    let totalTH = 0, totalAH = 0;

    data[sem].rows.forEach((row, index) => {
        const th = row[1];
        const ah = row[2];
        const dl = 0;
        const percentAH = th > 0 ? ((ah / th) * 100).toFixed(2) : "0.00";
        const percentAHDL = th > 0 ? ((ah / th) * 100).toFixed(2) : "0.00";

        totalTH += th;
        totalAH += ah;

        body.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td class="course">${row[0]}</td>
                <td>${th}</td>
                <td>${ah}</td>
                <td>${dl}</td>
                <td>${ah + dl}</td>
                <td>${percentAH}%</td>
                <td>${percentAHDL}%</td>
            </tr>
        `;
    });

    const totalPercent = totalTH > 0 ? ((totalAH / totalTH) * 100).toFixed(2) : "0.00";

    footer.innerHTML = `
        <tr>
            <td colspan="2">Total</td>
            <td>${totalTH}</td>
            <td>${totalAH}</td>
            <td>0</td>
            <td>${totalAH}</td>
            <td>${totalPercent}%</td>
            <td>${totalPercent}%</td>
        </tr>
    `;
}

// Load default semester
loadSemester("sem1");
</script>

</body>
</html>
