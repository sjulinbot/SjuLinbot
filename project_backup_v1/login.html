<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SJU - Student Portal Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #003a70;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .login-card {
            background: #ffffff;
            width: 380px;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* The Orange Top Strip */
        .login-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 8px;
            background: linear-gradient(to right, #ff8c00, #ffb100);
        }

        .sju-logo {
            width: 85px; height: 85px;
            background-color: #003a70;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin: 0 auto 20px;
        }

        .university-name {
            color: #003a70;
            font-size: 22px;
            font-weight: 700;
            margin: 10px 0;
        }

        .portal-label {
            color: #666;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 15px;
            border: 1px solid #e0e6ed;
            border-radius: 12px;
            background-color: #f8f9fb;
            font-size: 15px;
            box-sizing: border-box;
        }

        .sign-in-btn {
            width: 100%;
            padding: 16px;
            background-color: #003a70;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .sign-in-btn:hover { background-color: #00264d; }

        /* New Functional Links */
        .footer-links {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .forgot-link {
            color: #d9534f;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .back-home {
            color: #003a70;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .back-home:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="sju-logo">SJU</div>
    
    <div class="university-name">🎓 St Joseph's University</div>
    <div class="portal-label">Student Portal Login</div>

    <input type="text" class="input-field" placeholder="Register Number">
    <input type="password" class="input-field" placeholder="Password">

    <button class="sign-in-btn">SIGN IN</button>

    <div class="footer-links">
        <a href="#" class="forgot-link">Forgot Password?</a>
        <hr style="width: 50%; border: 0.5px solid #eee; margin: 5px auto;">
        <a href="index.html" class="back-home">← Back to Home</a>
    </div>
</div>

</body>
</html>
